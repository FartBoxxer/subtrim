<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="108" fill="#0d0d0d"/>
  <!-- Scissors blades -->
  <g transform="translate(256,256)">
    <!-- Top blade -->
    <path d="M-40,-30 C-70,-80 -30,-130 10,-100 L120,-10 C130,-2 130,2 120,10 L10,100 C-30,130 -70,80 -40,30 Z" fill="#00d48a" opacity="0.9"/>
    <!-- Bottom blade -->
    <path d="M40,30 C70,80 30,130 -10,100 L-120,10 C-130,2 -130,-2 -120,-10 L-10,-100 C30,-130 70,-80 40,-30 Z" fill="#00d48a"/>
    <!-- Center pivot -->
    <circle cx="0" cy="0" r="16" fill="#0d0d0d"/>
    <circle cx="0" cy="0" r="10" fill="#00d48a" opacity="0.6"/>
    <!-- Handle holes -->
    <ellipse cx="-55" cy="-70" rx="22" ry="28" transform="rotate(-30,-55,-70)" fill="#0d0d0d"/>
    <ellipse cx="55" cy="70" rx="22" ry="28" transform="rotate(-30,55,70)" fill="#0d0d0d"/>
  </g>
</svg>
