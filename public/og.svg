<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0d0d0d"/>
  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5"/>
  <!-- Accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="#00d48a"/>
  <!-- Logo area -->
  <text x="100" y="260" font-family="system-ui,-apple-system,sans-serif" font-size="72" font-weight="800" fill="#ffffff" letter-spacing="-1">SubTrim</text>
  <!-- Tagline -->
  <text x="100" y="320" font-family="system-ui,-apple-system,sans-serif" font-size="28" fill="#888888">Track, audit, and optimize your subscriptions.</text>
  <!-- Savings highlight -->
  <rect x="100" y="360" width="320" height="48" rx="10" fill="#00d48a" opacity="0.15"/>
  <text x="120" y="392" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="700" fill="#00d48a">Save hundreds per year</text>
  <!-- Mini receipt mockup on right -->
  <g transform="translate(750,100)">
    <rect width="340" height="430" rx="4" fill="#141414" stroke="#222" stroke-width="1"/>
    <!-- Receipt header -->
    <text x="170" y="40" font-family="monospace" font-size="12" fill="#444" text-anchor="middle" letter-spacing="2">MONTHLY STATEMENT</text>
    <line x1="30" y1="55" x2="310" y2="55" stroke="#222" stroke-dasharray="4,4"/>
    <!-- Line items -->
    <text x="30" y="85" font-family="system-ui,sans-serif" font-size="15" fill="#ccc">Netflix</text>
    <text x="310" y="85" font-family="system-ui,sans-serif" font-size="15" fill="#ccc" text-anchor="end">$15.49</text>
    <text x="30" y="115" font-family="system-ui,sans-serif" font-size="15" fill="#ccc">Spotify</text>
    <text x="310" y="115" font-family="system-ui,sans-serif" font-size="15" fill="#ccc" text-anchor="end">$10.99</text>
    <text x="30" y="145" font-family="system-ui,sans-serif" font-size="15" fill="#555" text-decoration="line-through">Hulu</text>
    <text x="310" y="145" font-family="system-ui,sans-serif" font-size="15" fill="#555" text-anchor="end" text-decoration="line-through">$17.99</text>
    <line x1="20" y1="140" x2="320" y2="140" stroke="#ef4444" stroke-width="1.5"/>
    <text x="30" y="175" font-family="system-ui,sans-serif" font-size="15" fill="#ccc">Disney+</text>
    <text x="310" y="175" font-family="system-ui,sans-serif" font-size="15" fill="#ccc" text-anchor="end">$13.99</text>
    <text x="30" y="205" font-family="system-ui,sans-serif" font-size="15" fill="#555" text-decoration="line-through">HBO Max</text>
    <text x="310" y="205" font-family="system-ui,sans-serif" font-size="15" fill="#555" text-anchor="end" text-decoration="line-through">$15.99</text>
    <line x1="20" y1="200" x2="320" y2="200" stroke="#ef4444" stroke-width="1.5"/>
    <text x="30" y="235" font-family="system-ui,sans-serif" font-size="15" fill="#ccc">ChatGPT Plus</text>
    <text x="310" y="235" font-family="system-ui,sans-serif" font-size="15" fill="#ccc" text-anchor="end">$20.00</text>
    <!-- Divider -->
    <line x1="30" y1="260" x2="310" y2="260" stroke="#222" stroke-dasharray="4,4"/>
    <!-- Totals -->
    <text x="30" y="290" font-family="system-ui,sans-serif" font-size="14" fill="#ef4444" font-weight="600">SubTrim savings</text>
    <text x="310" y="290" font-family="system-ui,sans-serif" font-size="14" fill="#ef4444" font-weight="700" text-anchor="end">-$33.98/mo</text>
    <line x1="30" y1="310" x2="310" y2="310" stroke="#333" stroke-width="2"/>
    <text x="30" y="340" font-family="system-ui,sans-serif" font-size="22" fill="#fff" font-weight="800">New Total</text>
    <text x="310" y="340" font-family="system-ui,sans-serif" font-size="22" fill="#00d48a" font-weight="800" text-anchor="end">$60.47/mo</text>
    <text x="310" y="365" font-family="system-ui,sans-serif" font-size="13" fill="#00d48a" font-weight="600" text-anchor="end">Save $407.76/year</text>
  </g>
  <!-- URL -->
  <text x="100" y="560" font-family="system-ui,-apple-system,sans-serif" font-size="18" fill="#444">subtrim.dev</text>
  <!-- Free badge -->
  <rect x="100" y="440" width="72" height="30" rx="6" fill="#00d48a"/>
  <text x="136" y="460" font-family="system-ui,sans-serif" font-size="14" fill="#000" font-weight="700" text-anchor="middle">FREE</text>
</svg>
