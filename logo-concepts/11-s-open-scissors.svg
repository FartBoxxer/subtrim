<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <circle cx="256" cy="256" r="256" fill="#0d0d0d"/>
  <g transform="translate(256,256)">
    <!-- The S is formed by the negative space between two open scissor blades -->
    <!-- Upper-left blade -->
    <path d="M-30,-8 C-90,-30 -110,-90 -60,-130 C-10,-170 50,-140 60,-105"
          fill="#00d48a" stroke="none"/>
    <!-- Lower-right blade -->
    <path d="M30,8 C90,30 110,90 60,130 C10,170 -50,140 -60,105"
          fill="#00d48a" stroke="none"/>
    <!-- Cut out the S-curve center to create the S shape -->
    <!-- Upper S hole -->
    <path d="M-15,-15 C-60,-30 -75,-70 -42,-100 C-10,-130 30,-110 40,-85"
          fill="#0d0d0d" stroke="none"/>
    <!-- Lower S hole -->
    <path d="M15,15 C60,30 75,70 42,100 C10,130 -30,110 -40,85"
          fill="#0d0d0d" stroke="none"/>
    <!-- Pivot dot at center -->
    <circle cx="0" cy="0" r="6" fill="#0d0d0d"/>
    <!-- Handle rings -->
    <circle cx="72" cy="-115" r="22" fill="none" stroke="#00d48a" stroke-width="10"/>
    <circle cx="-72" cy="115" r="22" fill="none" stroke="#00d48a" stroke-width="10"/>
  </g>
</svg>
