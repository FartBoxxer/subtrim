<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="108" fill="#0d0d0d"/>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="#1a1a1a" stroke-width="16"/>
  <!-- Green accent arc — partial ring like SubScore -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="#00d48a" stroke-width="16"
          stroke-linecap="round" stroke-dasharray="700 243"
          transform="rotate(-90,256,256)" opacity="0.9"/>
  <!-- Inner filled circle -->
  <circle cx="256" cy="256" r="110" fill="#141414"/>
  <!-- Bold minus sign -->
  <rect x="176" y="240" width="160" height="32" rx="16" fill="#00d48a"/>
</svg>
